services:
  db:
    image: postgres:16-alpine
    container_name: trama-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-trama}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-trama}
    volumes:
      - trama_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trama}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: trama-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-trama}:${DB_PASSWORD}@db:5432/${DB_NAME:-trama}?schema=public"
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      RUN_MIGRATIONS: "true"
    volumes:
      - trama_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  trama_pgdata:
  trama_uploads:
