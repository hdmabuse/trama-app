services:
  db:
    image: postgres:16-alpine
    container_name: trama-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trama
      POSTGRES_PASSWORD: trama_local_2026
      POSTGRES_DB: trama
    ports:
      - "5432:5432"
    volumes:
      - trama_pgdata:/var/lib/postgresql/data

volumes:
  trama_pgdata:
